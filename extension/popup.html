<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      background-color: #1A1A1F;
      color: #E5E5E5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .header {
      display: flex;
      items-center: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .logo {
      width: 24px;
      height: 24px;
      background-color: #F5E642;
      color: #1A1A1F;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 14px;
    }
    .title {
      font-size: 16px;
      font-weight: bold;
      color: white;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 10px;
      font-weight: bold;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }
    input, select, textarea {
      width: 100%;
      background-color: #141418;
      border: 1px solid #2A2A32;
      border-radius: 6px;
      padding: 8px;
      color: #E5E5E5;
      font-size: 12px;
      box-sizing: border-box;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #F5E642;
    }
    textarea {
      resize: none;
    }
    .btn {
      width: 100%;
      background-color: #F5E642;
      color: #1A1A1F;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
    }
    .btn:hover {
      background-color: #e0d23a;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      text-align: center;
      font-size: 11px;
      margin-top: 12px;
      color: #F5E642;
      display: none;
    }
    .error {
      color: #ff4444;
      font-size: 11px;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">V</div>
    <div class="title">VibeRef Clipper</div>
  </div>

  <div class="form-group">
    <label>Page Title</label>
    <input type="text" id="pageTitle">
  </div>

  <div class="form-group">
    <label>URL</label>
    <input type="text" id="pageUrl" disabled>
  </div>

  <div class="form-group">
    <label>Collection</label>
    <select id="collection">
      <option value="">컬렉션 선택 안함</option>
    </select>
  </div>

  <div class="form-group">
    <label>Tags (쉼표 구분)</label>
    <input type="text" id="tags" placeholder="미니멀, SaaS, 웹디자인">
  </div>

  <div class="form-group">
    <label>Memo</label>
    <textarea id="memo" rows="3" placeholder="메모를 입력하세요..."></textarea>
  </div>

  <button id="saveBtn" class="btn">저장하기</button>
  <div id="status" class="status">저장 완료 ✓</div>
  <div id="error" class="error"></div>

  <script src="popup.js"></script>
</body>
</html>
