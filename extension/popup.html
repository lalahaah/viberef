    <body>
    <div class="header">
    <div class="header-left">
      <div class="logo">V</div>
      <div class="title">VibeRef Clipper</div>
    </div>
    <button id="langToggle" class="lang-toggle">KO</button>
    </div>

    <div class="form-group">
    <label id="labelTitle">Page Title</label>
    <input type="text" id="pageTitle">
    </div>

    <div class="form-group">
    <label id="labelUrl">URL</label>
    <input type="text" id="pageUrl" disabled>
    </div>

    <div class="form-group">
    <label id="labelCollection">Collection</label>
    <select id="collection">
      <option value="" id="optionNoCollection">컬렉션 선택 안함</option>
    </select>
    </div>

    <div class="form-group">
    <label id="labelTags">Tags</label>
    <input type="text" id="tags" placeholder="미니멀, SaaS, 웹디자인">
    </div>

    <div class="form-group">
    <label id="labelMemo">Memo</label>
    <textarea id="memo" rows="3" placeholder="메모를 입력하세요..."></textarea>
    </div>

    <button id="saveBtn" class="btn">저장하기</button>
    <div id="status" class="status">저장 완료 ✓</div>
    <div id="error" class="error"></div>

    <script src="popup.js"></script>
    </body>

</html>
